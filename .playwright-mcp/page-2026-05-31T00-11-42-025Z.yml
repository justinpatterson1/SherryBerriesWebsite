    - region "Designed for the way you shine." [ref=e288]:
      - generic [ref=e294]:
        - generic [ref=e295]: Our story
        - heading "Designed for the way you shine." [level=2] [ref=e296]
        - paragraph [ref=e297]: SherryBerries was created to make piercing care and self expression feel beautiful — never clinical.
        - paragraph [ref=e298]: "Founder Sherry Antoine spent a decade behind the needle, frustrated by jewelry that looked like medical hardware and aftercare that smelled like a hospital. So she built the line she wished her clients could buy: studio-grade titanium and gold-fill pieces, healing essentials with skincare-grade ingredients, and a brand that treats your piercing like an act of softness, not a wound."
