    - region "Everything you need to heal happy." [ref=e304]:
      - generic [ref=e305]:
        - generic [ref=e306]: Learn · Piercing 101
        - heading "Everything you need to heal happy." [level=2] [ref=e307]
      - generic [ref=e308]:
        - generic [ref=e309]:
          - generic [ref=e310]:
            - button "How to clean a fresh piercing" [expanded] [ref=e311] [cursor=pointer]:
              - generic [ref=e312]: How to clean a fresh piercing
            - region [ref=e314]:
              - generic [ref=e315]:
                - paragraph [ref=e316]: Twice a day, spray a sterile saline mist over the piercing and let it air-dry — no twisting, no soap, no peroxide. If crust forms, soften it with saline first, then gently wipe with a clean gauze.
                - paragraph [ref=e317]: Avoid touching the piercing with unwashed hands, and skip pools, hot tubs, and oceans until the studio has cleared the site.
          - generic [ref=e318]:
            - button "Jewelry sizing guide" [ref=e319] [cursor=pointer]:
              - generic [ref=e320]: Jewelry sizing guide
            - region:
              - paragraph [ref=e323]: Body jewelry is measured by gauge (thickness) and length or diameter. Most fresh piercings start at 16G or 14G with extra length to accommodate swelling. Once healed, you can downsize to a shorter post for a flush, polished look. When in doubt, message us with your current piece's measurements.
          - generic [ref=e324]:
            - button "Fresh vs healed piercings" [ref=e325] [cursor=pointer]:
              - generic [ref=e326]: Fresh vs healed piercings
            - region:
              - generic [ref=e328]:
                - paragraph [ref=e329]: "How you treat a piercing depends on where it is in its healing journey:"
                - list [ref=e330]:
                  - listitem [ref=e331]:
                    - strong [ref=e332]: "Fresh (0–6 weeks):"
                    - text: longer post, daily saline, implant-grade titanium only.
                  - listitem [ref=e333]:
                    - strong [ref=e334]: "Healing (6 weeks–6 months):"
                    - text: still saline, but you can start gentler material rotations.
                  - listitem [ref=e335]:
                    - strong [ref=e336]: "Healed:"
                    - text: wear what makes you glow — gold-fill, opals, dangles, statement pieces.
          - generic [ref=e337]:
            - button "Signs of irritation" [ref=e338] [cursor=pointer]:
              - generic [ref=e339]: Signs of irritation
            - region:
              - paragraph [ref=e342]: Mild redness, clear lymph fluid, and tenderness in the first few weeks are normal. Watch for thick yellow or green discharge, hot/painful swelling that worsens, bleeding after the first week, or angry bumps. Those are signs to message us or visit a piercer — never try to remove the jewelry on your own.
          - generic [ref=e343]:
            - button "Best jewelry materials" [ref=e344] [cursor=pointer]:
              - generic [ref=e345]: Best jewelry materials
            - region:
              - paragraph [ref=e348]: "We only stock materials safe for long-term wear: implant-grade titanium (ASTM F-136), solid 14k gold, niobium, and nickel-free surgical-grade options. Avoid plated jewelry, sterling silver, and mystery alloys in fresh piercings — they off-gas and prolong healing."
          - generic [ref=e349]:
            - button "Piercing healing timeline" [ref=e350] [cursor=pointer]:
              - generic [ref=e351]: Piercing healing timeline
            - region:
              - paragraph [ref=e354]: Earlobes heal in 6–10 weeks. Nostrils, septums, and most cartilage piercings take 4–9 months. Navels and nipples can take 9–12 months. Healing is not linear — you may feel fully healed and then have a flare-up. Stay consistent with aftercare and don't downsize too early.
